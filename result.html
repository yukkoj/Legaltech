<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Generated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5 text-center">
        <div class="card">
            <div class="card-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <h1 class="card-title text-success">Document Ready</h1>
                <p class="card-text">Your Advanced Directive has been generated and is ready for download.</p>
                <a href="{{ url_for('download_file', filename=filename) }}" class="btn btn-primary btn-lg">
                    Download PDF
                </a>
                <hr>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Start Over</a>
            </div>
        </div>
    </div>
</body>
</html>
